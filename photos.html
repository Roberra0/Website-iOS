<!DOCTYPE html>
<html lang="en">

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-BCCGP9K8G5"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-BCCGP9K8G5');
    // Active time tracking
    let activeMs = 0, lastActive = Date.now();
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) { activeMs += Date.now() - lastActive; }
      else { lastActive = Date.now(); }
    });
    window.addEventListener('beforeunload', () => {
      if (!document.hidden) activeMs += Date.now() - lastActive;
      gtag('event', 'time_on_page', { active_ms: activeMs, page: 'photos', timestamp_ms: Date.now() });
    });
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── TOP BAR ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .topbar-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .topbar-back {
      font-size: 16px;
      font-weight: 400;
      color: #0A84FF;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ── SECTION LABEL ── */
    .section-label {
      padding: 22px 20px 10px;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    /* ── PHOTO GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      padding: 0 0 40px;
    }
    .grid-item {
      position: relative;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      cursor: pointer;
      background: #1c1c1e;
    }
    .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 200ms ease;
    }
    .grid-item:hover img { transform: scale(1.04); }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 90vw;
      max-height: 80vh;
      object-fit: contain;
      border-radius: 8px;
    }
    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 24px;
      font-size: 30px;
      color: #fff;
      cursor: pointer;
      opacity: 0.7;
      line-height: 1;
    }
    .lightbox-close:hover { opacity: 1; }
    .lightbox-caption {
      margin-top: 16px;
      font-size: 15px;
      color: rgba(255,255,255,0.6);
    }
  </style>
</head>
<body>

  <div class="topbar">
    <a href="index.html#end" class="topbar-back">
      <svg width="10" height="16" viewBox="0 0 10 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8.5 1.5L1.5 8L8.5 14.5" stroke="#0A84FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    const lbClose  = document.getElementById('lbClose');

    photos.forEach(p => {
      const item = document.createElement('div');
      item.className = 'grid-item';
      const img = document.createElement('img');
      img.src = p.src;
      img.alt = p.label;
      img.loading = 'lazy';
      item.appendChild(img);
      item.addEventListener('click', () => {
        lbImg.src = p.src;
        lbCaption.textContent = p.label;
        lightbox.classList.add('open');
      });
